<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hopper — Interior Loneliness</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Georgia', serif; }

#vignette {
  position:fixed; inset:0; pointer-events:none; z-index:80;
  background: radial-gradient(ellipse 72% 72% at 50% 50%,
    transparent 52%, rgba(0,0,0,0.18) 72%, rgba(0,0,0,0.38) 100%);
}

#info {
  position:absolute; top:22px; left:22px; color:rgba(255,255,255,0.55);
  background:rgba(0,0,0,0.0); padding:0; font-size:12px;
  z-index:100; line-height:1.9; letter-spacing:0.04em;
  font-style:italic;
}

#controls {
  position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.45); padding:10px 22px; border-radius:20px;
  color:rgba(255,255,255,0.45); font-size:11px; z-index:100;
  letter-spacing:0.05em;
}

#caption {
  position:absolute; bottom:70px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.0); font-size:13px; z-index:100;
  font-style:italic; letter-spacing:0.08em; text-align:center;
  transition:color 3s ease;
  white-space:nowrap;
}

#loading {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  color:rgba(255,255,255,0.6); font-size:18px; z-index:1000;
  font-style:italic; letter-spacing:0.1em;
}
</style>
</head>
<body>
<div id="loading">entering the room…</div>
<div id="vignette"></div>
<div id="info">
  ✦ Hopper — Interior<br>
  <small style="opacity:0.7">Move: W A S D &nbsp;·&nbsp; Look: Mouse</small>
</div>
<div id="caption" id="caption"></div>
<div id="controls">W A S D — move &nbsp;·&nbsp; Mouse — look &nbsp;·&nbsp; F — fullscreen</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────────
// CORE VOCABULARY:
//   window · directional light · stillness
//   void · interior enclosure · voyeuristic viewpoint
//
// EMOTIONAL TARGET: loneliness (low arousal, negative valence)
// NOT: fear (high arousal). No threat. No darkness. No locked doors.
// The world continues outside. You are simply not in it.
// ─────────────────────────────────────────────

const CFG = {
  // Room — proportions of a real apartment room, not a cell
  rW: 10, rH: 3.6, rD: 9,
  camH: 1.62,
  moveSpeed: 2.8,
  mouseSens: 0.0016,
  bound: 4.2,

  // Lighting — overcast afternoon, cool grey-white
  // Low arousal = dim but NOT dark. Think 3pm cloudy sky.
  ambientCol:   0xb8c4cc,   // cool grey ambient
  ambientInt:   0.55,       // clearly visible, not threatening
  dirCol:       0xd0dce8,   // cool daylight directional
  dirInt:       0.72,
  windowGlowCol:0x8fb0c8,   // cool blue-grey window bleed
  windowGlowInt:0.38,

  // Fog — gentle atmospheric depth, not darkness
  fogCol: 0xc8cfd4,
  fogNear: 14,
  fogFar:  22,
};

let scene, camera, renderer, clock;
let mF=false,mB=false,mL=false,mR=false;
const vel = new THREE.Vector3();

function buildCityTexture() {
  // Voyeuristic viewpoint — crowded city outside, you are alone inside.
  // Overcast afternoon. Every window across the street has a life in it.
  const W=1024, H=512;
  const cv = document.createElement('canvas');
  cv.width=W; cv.height=H;
  const ctx = cv.getContext('2d');

  // Sky — overcast, pale grey-blue layered
  const sky = ctx.createLinearGradient(0,0,0,H*0.6);
  sky.addColorStop(0,   '#9aaebb');
  sky.addColorStop(0.5, '#b8c8d4');
  sky.addColorStop(1,   '#ccd6dc');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,H);

  // ── LAYER 1: far background buildings (small, hazy, blue-grey) ──
  const farBlds = [
    {x:-5, w:55, h:95},  {x:48, w:38, h:120}, {x:82, w:62, h:80},
    {x:138,w:45, h:110}, {x:178,w:55, h:90},  {x:228,w:70, h:105},
    {x:292,w:40, h:130}, {x:328,w:58, h:88},  {x:380,w:48, h:115},
    {x:422,w:65, h:95},  {x:480,w:42, h:125}, {x:518,w:55, h:85},
    {x:568,w:72, h:108}, {x:634,w:38, h:92},  {x:666,w:55, h:118},
    {x:715,w:48, h:88},  {x:756,w:62, h:102}, {x:812,w:45, h:128},
    {x:850,w:58, h:85},  {x:902,w:70, h:110}, {x:965,w:50, h:95},
  ];
  farBlds.forEach(b => {
    ctx.fillStyle = `hsl(210,10%,${55+Math.random()*10}%)`;
    ctx.fillRect(b.x, H-b.h, b.w, b.h);
    // A few hazy windows — barely visible
    const cols=Math.floor((b.w-4)/8), rows=Math.floor((b.h-10)/10);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
      if(Math.random()<0.22){
        ctx.fillStyle=`rgba(255,230,160,${0.25+Math.random()*0.2})`;
        ctx.fillRect(b.x+3+c*8, H-b.h+6+r*10, 4,5);
      }
    }
  });

  // ── LAYER 2: mid-ground buildings (main mass, lots of lit windows) ──
  const midBlds = [
    {x:0,  w:75, h:195}, {x:70, w:48, h:240}, {x:112,w:85, h:170},
    {x:190,w:52, h:260}, {x:236,w:68, h:185}, {x:298,w:55, h:230},
    {x:348,w:92, h:160}, {x:432,w:48, h:255}, {x:474,w:72, h:175},
    {x:540,w:58, h:245}, {x:592,w:80, h:165}, {x:665,w:45, h:235},
    {x:704,w:75, h:180}, {x:772,w:55, h:250}, {x:820,w:88, h:168},
    {x:900,w:50, h:240}, {x:944,w:68, h:178},
  ];
  midBlds.forEach(b => {
    // Slightly darker than far buildings — more presence
    ctx.fillStyle = `hsl(210,7%,${38+Math.random()*10}%)`;
    ctx.fillRect(b.x, H-b.h, b.w, b.h);
    // Dense lit windows — CROWDED = life happening everywhere except here
    const cols=Math.floor((b.w-6)/9), rows=Math.floor((b.h-12)/12);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
      if(Math.random()<0.48){
        const warm=Math.random()>0.25;
        const wx=b.x+4+c*9, wy=H-b.h+8+r*12;
        ctx.fillStyle = warm
          ? `rgba(255,${210+Math.floor(Math.random()*35)},${90+Math.floor(Math.random()*70)},${0.6+Math.random()*0.3})`
          : `rgba(190,215,255,${0.45+Math.random()*0.3})`;
        ctx.fillRect(wx,wy,5,7);
        // Soft glow halo around each lit window
        const grd=ctx.createRadialGradient(wx+2,wy+3,0,wx+2,wy+3,7);
        grd.addColorStop(0, warm?'rgba(255,200,80,0.14)':'rgba(140,180,255,0.12)');
        grd.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=grd;
        ctx.fillRect(wx-5,wy-4,16,16);
      }
    }
  });

  // ── LAYER 3: foreground street (closest buildings, across the street) ──
  // These are the windows you can almost see into — voyeuristic core
  const fgBlds = [
    {x:-8, w:110,h:H*0.55}, {x:95, w:80, h:H*0.48},
    {x:168,w:95, h:H*0.58}, {x:256,w:75, h:H*0.45},
    {x:324,w:105,h:H*0.52}, {x:420,w:88, h:H*0.60},
    {x:500,w:95, h:H*0.47}, {x:587,w:80, h:H*0.55},
    {x:660,w:110,h:H*0.50}, {x:762,w:88, h:H*0.57},
    {x:842,w:95, h:H*0.44}, {x:930,w:85, h:H*0.53},
  ];
  fgBlds.forEach(b => {
    b.h = Math.round(b.h);
    ctx.fillStyle = `hsl(210,6%,${32+Math.random()*8}%)`;
    ctx.fillRect(b.x, H-b.h, b.w, b.h);
    // Large, clearly visible windows — you can see silhouettes in these
    const cols=Math.floor((b.w-8)/16), rows=Math.floor((b.h-14)/20);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
      const wx=b.x+6+c*16, wy=H-b.h+10+r*20;
      const lit=Math.random()<0.6;
      if(lit){
        const warm=Math.random()>0.2;
        ctx.fillStyle = warm
          ? `rgba(255,${205+Math.floor(Math.random()*40)},${85+Math.floor(Math.random()*80)},${0.72+Math.random()*0.22})`
          : `rgba(210,230,255,${0.55+Math.random()*0.3})`;
        ctx.fillRect(wx,wy,10,13);
        // Silhouette in some windows — a figure at a desk, a shadow moving
        if(Math.random()<0.28){
          ctx.fillStyle='rgba(20,15,10,0.45)';
          // head
          ctx.beginPath();
          ctx.arc(wx+5, wy+5, 2.5, 0, Math.PI*2);
          ctx.fill();
          // body
          ctx.fillRect(wx+3,wy+7,4,5);
        }
        // Window glow spill on building facade
        const grd=ctx.createRadialGradient(wx+5,wy+6,0,wx+5,wy+6,12);
        grd.addColorStop(0,warm?'rgba(255,190,60,0.18)':'rgba(150,200,255,0.15)');
        grd.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=grd;
        ctx.fillRect(wx-8,wy-6,26,26);
      } else {
        // Dark windows — someone not home, or blinds drawn
        ctx.fillStyle='rgba(15,18,22,0.55)';
        ctx.fillRect(wx,wy,10,13);
      }
    }
  });

  // ── STREET LEVEL — busy, crowded ──
  // Pavement
  ctx.fillStyle='rgba(148,150,152,0.85)';
  ctx.fillRect(0, H-38, W, 38);
  // Pavement detail — wet reflection strip
  ctx.fillStyle='rgba(180,190,200,0.22)';
  ctx.fillRect(0, H-18, W, 10);

  // Crowd of pedestrians — many small figures (you are not among them)
  for(let i=0;i<55;i++){
    const px=Math.random()*W;
    const py=H-32+Math.random()*18;
    const figH=6+Math.random()*5;
    ctx.fillStyle=`rgba(${30+Math.floor(Math.random()*40)},${28+Math.floor(Math.random()*35)},${25+Math.floor(Math.random()*35)},${0.55+Math.random()*0.35})`;
    // body
    ctx.fillRect(px-2, py-figH, 4, figH);
    // head
    ctx.beginPath();
    ctx.arc(px, py-figH-2.5, 2.2, 0, Math.PI*2);
    ctx.fill();
  }

  // ── Parked cars ──
  for(let i=0;i<6;i++){
    const cx=40+i*160+Math.random()*30;
    ctx.fillStyle=`hsl(${200+Math.random()*40},${8+Math.random()*12}%,${35+Math.random()*15}%)`;
    ctx.fillRect(cx, H-26, 55, 16);
    // windshield glint
    ctx.fillStyle='rgba(200,220,240,0.3)';
    ctx.fillRect(cx+8, H-24, 18, 6);
  }

  // Atmospheric overcast haze overlay
  ctx.fillStyle='rgba(175,188,198,0.14)';
  ctx.fillRect(0,0,W,H);

  // Very subtle rain streaks — overcast suggests recent rain
  ctx.strokeStyle='rgba(190,200,210,0.12)';
  ctx.lineWidth=0.5;
  for(let i=0;i<40;i++){
    const rx=Math.random()*W;
    ctx.beginPath();
    ctx.moveTo(rx, 0);
    ctx.lineTo(rx-4, H);
    ctx.stroke();
  }

  const tex = new THREE.CanvasTexture(cv);
  tex.needsUpdate = true;
  return tex;
}

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(CFG.fogCol);
  // Gentle fog — not darkness, just depth
  scene.fog = new THREE.Fog(CFG.fogCol, CFG.fogNear, CFG.fogFar);

  camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.1, 60);
  camera.position.set(0, CFG.camH, CFG.rD/2 - 1.5);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  // Neutral tone mapping — no dramatic cinematic crush
  renderer.toneMapping = THREE.LinearToneMapping;
  renderer.toneMappingExposure = 1.05;
  document.body.appendChild(renderer.domElement);

  clock = new THREE.Clock();

  // ── LIGHTING ──────────────────────────────────────────
  // DESIGN PRINCIPLE: loneliness lives in ordinary light.
  // A room lit by overcast afternoon daylight through one window.
  // Not dark. Not dramatic. Just... still.

  // Cool ambient — the grey light that fills everything equally
  const ambient = new THREE.AmbientLight(CFG.ambientCol, CFG.ambientInt);
  scene.add(ambient);

  // Single directional light entering from window (left wall)
  // This IS the vocabulary: one directional light, one window, one source
  const dir = new THREE.DirectionalLight(CFG.dirCol, CFG.dirInt);
  dir.position.set(-8, 4, 2);
  dir.target.position.set(3, 0, -1);
  dir.castShadow = true;
  dir.shadow.mapSize.set(2048,2048);
  dir.shadow.camera.near = 0.5;
  dir.shadow.camera.far  = 25;
  dir.shadow.camera.left = -8;
  dir.shadow.camera.right= 8;
  dir.shadow.camera.top  = 6;
  dir.shadow.camera.bottom=-6;
  dir.shadow.bias = -0.0002;
  scene.add(dir);
  scene.add(dir.target);

  // Window bleed — cool blue-grey pool on floor
  const winGlow = new THREE.PointLight(CFG.windowGlowCol, CFG.windowGlowInt, 7);
  winGlow.position.set(-CFG.rW/2+0.5, 1.8, 0.5);
  scene.add(winGlow);

  // Soft secondary bounce from floor — very faint warm
  const bounce = new THREE.PointLight(0xd4c8b0, 0.08, 8);
  bounce.position.set(0, 0.1, 0);
  scene.add(bounce);

  buildRoom();
  buildWindow();
  buildFurniture();
  buildVoid();
  setupControls();
  setupAudio();

  setTimeout(()=>{
    document.getElementById('loading').style.display='none';
    // Delayed caption — arrives like a thought
    setTimeout(()=>{
      const cap = document.getElementById('caption');
      cap.textContent = 'the room is the same as yesterday.';
      cap.style.color = 'rgba(255,255,255,0.28)';
      setTimeout(()=>{ cap.style.color='rgba(255,255,255,0.0)'; }, 7000);
    }, 4000);
  }, 900);

  animate();
}

function buildRoom() {
  // VOCABULARY: interior enclosure
  // Proportions of a real inhabited room — not a cell, not a vast hall.
  // Standard apartment: 10 x 9 x 3.6m
  // Walls: warm off-white plaster — the color of rooms that once had people in them

  const plaster = new THREE.MeshStandardMaterial({
    color: 0xddd8ce, roughness: 0.92, metalness: 0.0
  });
  const plasterDark = new THREE.MeshStandardMaterial({
    color: 0xccc6bb, roughness: 0.94, metalness: 0.0
  });

  // Floor — worn wood, pale
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0xb8a888, roughness: 0.88, metalness: 0.02
  });
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(CFG.rW, CFG.rD, 12, 12), floorMat
  );
  floor.rotation.x = -Math.PI/2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Floor boards — thin lines giving depth and perspective convergence
  // VOCABULARY: directional lines emphasize the void of the room
  const boardMat = new THREE.LineBasicMaterial({color:0x9a8868, transparent:true, opacity:0.28});
  for(let i=-4;i<=4;i++) {
    const pts = [
      new THREE.Vector3(i*1.1, 0.003, CFG.rD/2),
      new THREE.Vector3(i*1.1, 0.003, -CFG.rD/2)
    ];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), boardMat));
  }

  // Ceiling — slightly darker, feels like weight above
  const ceil = new THREE.Mesh(
    new THREE.PlaneGeometry(CFG.rW, CFG.rD), plasterDark
  );
  ceil.rotation.x = Math.PI/2;
  ceil.position.y = CFG.rH;
  scene.add(ceil);

  // Back wall
  const bw = new THREE.Mesh(new THREE.PlaneGeometry(CFG.rW, CFG.rH), plaster);
  bw.position.set(0, CFG.rH/2, -CFG.rD/2);
  bw.receiveShadow = true;
  scene.add(bw);

  // Left wall (window wall) — slightly cooler from daylight
  const lwMat = new THREE.MeshStandardMaterial({color:0xd4d0c8, roughness:0.92});
  const lw = new THREE.Mesh(new THREE.PlaneGeometry(CFG.rD, CFG.rH), lwMat);
  lw.position.set(-CFG.rW/2, CFG.rH/2, 0);
  lw.rotation.y = Math.PI/2;
  lw.receiveShadow = true;
  scene.add(lw);

  // Right wall
  const rw = new THREE.Mesh(new THREE.PlaneGeometry(CFG.rD, CFG.rH), plaster);
  rw.position.set(CFG.rW/2, CFG.rH/2, 0);
  rw.rotation.y = -Math.PI/2;
  rw.receiveShadow = true;
  scene.add(rw);

  // Baseboard trim
  const trimMat = new THREE.MeshStandardMaterial({color:0xe8e0d4, roughness:0.7});
  const trimH = 0.1;
  [[0,0,-CFG.rD/2,CFG.rW,0],[-CFG.rW/2,Math.PI/2,0,CFG.rD,0],[CFG.rW/2,-Math.PI/2,0,CFG.rD,0]].forEach(([x,ry,z,w])=>{
    const t = new THREE.Mesh(new THREE.BoxGeometry(w, trimH, 0.05), trimMat);
    t.position.set(x, trimH/2, z);
    t.rotation.y = ry;
    scene.add(t);
  });

  // Ceiling cornice — subtle
  const cornMat = new THREE.MeshStandardMaterial({color:0xe0dcd4, roughness:0.8});
  const cornH = 0.08;
  const corniceBack = new THREE.Mesh(new THREE.BoxGeometry(CFG.rW+0.1, cornH, 0.12), cornMat);
  corniceBack.position.set(0, CFG.rH-cornH/2, -CFG.rD/2+0.06);
  scene.add(corniceBack);
}

function buildWindow() {
  // VOCABULARY: window — the most important element.
  // The window is where the world is. You are on the inside.
  // VOYEURISTIC VIEWPOINT: you look out, they are in their lives.
  // The window does NOT threaten. It simply shows you what you are not part of.

  const wW = 1.6, wH = 2.2;
  const wX = -CFG.rW/2 + 0.05;
  const wY = 1.1; // sill height — window from 1.1 to 3.3m, eye level visible
  const wZ = 0.8; // slightly forward of center

  // Frame — painted white wood
  const frameMat = new THREE.MeshStandardMaterial({color:0xf0ece4, roughness:0.7});

  // Outer frame
  const frameOuter = new THREE.Mesh(new THREE.BoxGeometry(0.1, wH+0.2, 0.14), frameMat);
  frameOuter.position.set(wX+0.04, wY+wH/2, wZ);
  scene.add(frameOuter);

  [[0,wH/2+0.05,wW+0.1,0.1],[0,-0.12,wW+0.1,0.1],[wW/2+0.03,wH/2,0.1,wH],[-(wW/2+0.03),wH/2,0.1,wH]].forEach(([ox,oy,fw,fh])=>{
    const f = new THREE.Mesh(new THREE.BoxGeometry(fw, fh, 0.14), frameMat);
    f.position.set(wX+0.04+ox, wY+oy, wZ);
    scene.add(f);
  });

  // Horizontal divider bar
  const hBar = new THREE.Mesh(new THREE.BoxGeometry(wW, 0.06, 0.10), frameMat);
  hBar.position.set(wX+0.05, wY+wH*0.52, wZ);
  scene.add(hBar);

  // Vertical divider bar
  const vBar = new THREE.Mesh(new THREE.BoxGeometry(0.06, wH, 0.10), frameMat);
  vBar.position.set(wX+0.05, wY+wH/2, wZ);
  scene.add(vBar);

  // GLASS — the outside world visible, slightly cool reflection
  // City texture = voyeuristic content: life is there, you are here
  const cityTex = buildCityTexture();
  const glassMat = new THREE.MeshPhysicalMaterial({
    map: cityTex,
    color: 0xeef2f5,
    transparent: true,
    opacity: 0.88,
    roughness: 0.05,
    metalness: 0.0,
    transmission: 0.1,
  });
  const glass = new THREE.Mesh(new THREE.PlaneGeometry(wW, wH), glassMat);
  glass.position.set(wX+0.08, wY+wH/2, wZ);
  glass.rotation.y = Math.PI/2;
  scene.add(glass);

  // Window sill — depth cue, invites leaning
  const sillMat = new THREE.MeshStandardMaterial({color:0xe8e2d8, roughness:0.75});
  const sill = new THREE.Mesh(new THREE.BoxGeometry(wW+0.2, 0.06, 0.22), sillMat);
  sill.position.set(wX+0.08, wY-0.04, wZ);
  sill.rotation.y = Math.PI/2;
  sill.castShadow = true;
  scene.add(sill);

  // Light PATCH on floor from window — the visible mark of outside
  // This is directional light's shadow cast — shows window geometry on floor
  const patchMat = new THREE.MeshStandardMaterial({
    color: 0xd8e4ee, transparent:true, opacity:0.22, roughness:1.0
  });
  const patch = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 2.5), patchMat);
  patch.rotation.x = -Math.PI/2;
  patch.position.set(-CFG.rW/2+2.2, 0.005, wZ+0.3);
  scene.add(patch);

  // Curtain — one side only (half-drawn, like someone left in a hurry or never came back)
  // Curtain = evidence of habitation, now still
  const curtMat = new THREE.MeshStandardMaterial({
    color: 0xd4cfc0, roughness:0.95, side:THREE.DoubleSide,
    transparent:true, opacity:0.88
  });
  // Only LEFT curtain panel — right side open to world (voyeuristic)
  const curtL = new THREE.Mesh(new THREE.PlaneGeometry(0.55, wH+0.3), curtMat);
  curtL.position.set(wX+0.1, wY+wH/2+0.05, wZ-wW*0.28);
  curtL.rotation.y = Math.PI/2;
  scene.add(curtL);
}

function buildFurniture() {
  // VOCABULARY: interior enclosure — the room has been lived in.
  // PRINCIPLE: absence of people, presence of their traces.
  // No one is here. Someone was.

  // ── TABLE (small, near window — the classic Hopper position) ──
  const tableMat = new THREE.MeshStandardMaterial({color:0x8a7a62, roughness:0.82, metalness:0.05});
  const tableTop = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.04, 0.55), tableMat);

  corrL.position.set(3.8-1.25, CFG.rH/2, -CFG.rD/2-2.2);

  const corrR = new THREE.Mesh(new THREE.PlaneGeometry(5, CFG.rH), corrMat);
  corrR.position.set(3.8+1.25, CFG.rH/2, -CFG.rD/2-2.2);

  // End wall of corridor — far away, slightly darker, just empty

function setupControls() {
  document.addEventListener('click', ()=> document.body.requestPointerLock());
  document.addEventListener('keydown', e=> {
    if(e.code==='KeyW') mF=true;
    if(e.code==='KeyS') mB=true;
    if(e.code==='KeyA') mL=true;
    if(e.code==='KeyD') mR=true;
    if(e.code==='KeyF' && !document.fullscreenElement) document.documentElement.requestFullscreen();
  });
  document.addEventListener('keyup', e=> {
    if(e.code==='KeyW') mF=false;
    if(e.code==='KeyS') mB=false;
    if(e.code==='KeyA') mL=false;
    if(e.code==='KeyD') mR=false;
  });
  document.addEventListener('mousemove', e=> {
    if(document.pointerLockElement) {
      camera.rotation.y -= e.movementX * CFG.mouseSens;
      camera.rotation.x -= e.movementY * CFG.mouseSens;
      camera.rotation.x = Math.max(-Math.PI/2.8, Math.min(Math.PI/2.8, camera.rotation.x));
    }
  });
  window.addEventListener('resize', ()=> {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

function setupAudio() {
  // SOUND VOCABULARY: stillness + distant life
  // The sound of loneliness is NOT silence (silence = absence = fear).
  // It is: distant urban hum, radiator ticking, the world going on elsewhere.
  try {
    const listener = new THREE.AudioListener();
    camera.add(listener);
    const ctx = listener.context;

    // Very low-frequency room tone — not threatening, just the hum of being alive
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 48; // room tone, barely perceptible
    gain.gain.value = 0.025;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();

    // Occasional distant radiator tick — warmth that doesn't reach you
    function tick() {
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.035, ctx.currentTime+0.01);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime+0.08);
      const b = ctx.createOscillator();
      b.type = 'triangle';
      b.frequency.value = 420 + Math.random()*80;
      b.connect(g);
      g.connect(ctx.destination);
      b.start();
      b.stop(ctx.currentTime+0.1);
      // Next tick: irregular interval (2-8 seconds)
      setTimeout(tick, 2000 + Math.random()*6000);
    }
    setTimeout(tick, 3000);

  } catch(e) { /* audio not critical */ }
}

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  // Movement
  vel.x *= (1 - 14*delta);
  vel.z *= (1 - 14*delta);
  const dir = new THREE.Vector3();
  dir.z = Number(mF) - Number(mB);
  dir.x = Number(mR) - Number(mL);
  dir.normalize();
  if(mF||mB) vel.z -= dir.z * CFG.moveSpeed * delta;
  if(mL||mR) vel.x -= dir.x * CFG.moveSpeed * delta;

  const fwd = new THREE.Vector3();
  camera.getWorldDirection(fwd);
  fwd.y = 0; fwd.normalize();
  const right = new THREE.Vector3();
  right.crossVectors(camera.up, fwd).normalize();
  camera.position.addScaledVector(fwd, vel.z);
  camera.position.addScaledVector(right, vel.x);
  camera.position.x = Math.max(-CFG.bound, Math.min(CFG.bound, camera.position.x));
  camera.position.z = Math.max(-CFG.bound, Math.min(CFG.bound, camera.position.z));
  camera.position.y = CFG.camH;

  renderer.render(scene, camera);
}
